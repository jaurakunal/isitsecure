name: CodeQL

# Dogfooding: run GitHub's static analysis on isitsecure's own code. Results
# show up under the repo's Security → Code scanning tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
