name: release-please

# Reads Conventional Commits on main, maintains a "Release PR" that bumps the
# version (pyproject.toml + isitsecure/__init__.py) and rewrites CHANGELOG.md,
# and tags a GitHub Release when that PR is merged. No manual changelog edits.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
